<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Risk Care - 통합 리스크 관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9c7de106e591f702f3debeb3004e8199&libraries=services"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .facility-list-item { padding: 12px; border-bottom: 1px solid #e2e8f0; cursor: pointer; transition: background-color 0.2s; }
        .facility-list-item:hover { background-color: #f1f5f9; }
        .facility-list-item.active { background-color: #e0f2fe; border-left: 3px solid #3b82f6; }
        .facility-list-name { font-weight: bold; color: #0f172a; font-size: 0.95rem; }
        .facility-list-addr { font-size: 0.82rem; color: #64748b; margin-top: 4px; }
        .linked-title-badge { background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; margin-left: 10px; border: 1px solid #bae6fd; }
    </style>
</head>
<body>
    
    <div class="sidebar">
        <div class="logo">🔍 리스크 케어 시스템</div>
        <div class="menu">
            <div class="menu-title">MENU</div>
            <a class="menu-item active" onclick="showPage('page-general', this)">📋 시설 일반 현황</a>
            <a class="menu-item" onclick="showPage('page-eval', this)">📝 현장 위험 평가</a>
            <a class="menu-item" onclick="showPage('page-report', this)">📊 결과 분석 및 보고서</a>
        </div>
    </div>

    <div class="main-content">
        
        <div class="header">
            <div class="header-title" style="display: flex; align-items: center;">
                <span id="main-header-title">시설 일반 현황</span>
                <span id="global-linked-facility-badge" class="linked-title-badge" style="display:none;">선택 기관: 없음</span>
            </div>
            
            <div class="user-info">
                <button class="btn-top-action" style="background-color: #10b981; color: white; border: none;" onclick="masterLoadAllData()">
                    📂 이전 평가 불러오기
                </button>
                <button class="btn-top-action" style="background-color: #ef4444; color: white; border: none;" onclick="masterSaveAllData()">
                    💾 위험성평가 결과 임시저장
                </button>
            </div>
        </div>

        <div id="page-general" class="page active">
            <div class="search-bar">
                <input type="text" id="search-facility-input" placeholder="주소 또는 기관명을 입력하세요 (예: 서초구 요양원)" onkeypress="if(event.keyCode==13) searchFacility();">
                <button onclick="searchFacility()">검색</button>
            </div>

            <div class="middle-grid">
                <div style="background: white; border-radius: 10px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden;">
                    <div style="padding: 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-weight: bold; color: #1e293b;">
                        검색 결과 <span id="search-count-badge" class="status-badge status-good">0</span>
                    </div>
                    <div id="facility-list-container" class="list-container">
                        <div style="padding: 30px 15px; text-align: center; color: #94a3b8; font-size: 0.9rem;">검색어를 입력해주세요.</div>
                    </div>
                </div>
                <div class="map-container">
                    <div id="kakao-map"></div>
                </div>
            </div>

            <h2 id="current-info-facility-name" style="margin-bottom: 15px; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px;">
                사업장을 검색/선택해주세요
            </h2>
            <div id="table-general-status"></div>
            <div id="table-instt-status" style="display:none;"></div>
        </div>

        <div id="page-eval" class="page">
            <h2 style="margin-bottom: 20px;" id="eval-page-title">📝 현장 위험 평가</h2>
            <div class="eval-section">
                <div style="background: white; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <p style="color: #64748b;">현장 위험 평가 체크리스트 항목들이 로드됩니다.</p>
                </div>
            </div>
        </div>

        <div id="page-report" class="page">
            <h2 style="margin-bottom: 20px;" id="report-page-title">📊 현장 평가 결과 분석</h2>
            <div class="metrics-grid">
                <div class="card">
                    <h3>총 점검 항목</h3>
                    <div class="value text-blue">0건</div>
                </div>
                <div class="card">
                    <h3>안전 (Good)</h3>
                    <div class="value text-green">0건</div>
                </div>
                <div class="card">
                    <h3>주의 (Warning)</h3>
                    <div class="value" style="color: #f59e0b;">0건</div>
                </div>
                <div class="card">
                    <h3>위험 (Danger)</h3>
                    <div class="value text-red">0건</div>
                </div>
            </div>
        </div>

    </div>

    <script src="generalinfo.js"></script>
    <script src="evaluation.js"></script>
    
    <script>
        // 전역 변수로 선택된 기관명을 관리 (링크 동기화용)
        let globalSelectedFacilityName = "미지정시설";

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof initMap === 'function') {
                initMap();
            }
            // 기존 임시 세션이 있다면 상단 배지 복원
            const saved = localStorage.getItem('riskAssessmentOverview');
            if(saved) {
                const data = JSON.parse(saved);
                if(data.name) updateGlobalFacilityLink(data.name);
            }
        });

        // 기관명 링크 상태 업데이트 전역 매니저
        function updateGlobalFacilityLink(name) {
            if(!name) return;
            globalSelectedFacilityName = name;
            
            // 1. 헤더 영역 배지 링크 반영
            const badge = document.getElementById('global-linked-facility-badge');
            if(badge) {
                badge.innerText = `대상 기관: ${name}`;
                badge.style.display = 'inline-block';
            }
            // 2. 다른 위험평가 모듈 타이틀 내부 텍스트 갱신 연동
            const evalTitle = document.getElementById('eval-page-title');
            if(evalTitle) evalTitle.innerHTML = `📝 현장 위험 평가 <span style="font-size:1rem; color:#2563eb; font-weight:normal;">[대상: ${name}]</span>`;
            
            const reportTitle = document.getElementById('report-page-title');
            if(reportTitle) reportTitle.innerHTML = `📊 현장 평가 결과 분석 <span style="font-size:1rem; color:#2563eb; font-weight:normal;">[대상: ${name}]</span>`;
        }

        // 💡 [요청 3 반영] 탭 전환 시 상시 백그라운드 자동 임시저장 프로토콜
        function showPage(pageId, element) {
            console.log("[Auto-Save] 사용자가 탭을 전환하여 현재 입력 상태를 자동 백업합니다.");
            if (typeof saveOverviewData === 'function') {
                const currentOverview = saveOverviewData();
                if(currentOverview && currentOverview.name) {
                    localStorage.setItem('riskAssessmentOverview', JSON.stringify(currentOverview));
                    updateGlobalFacilityLink(currentOverview.name);
                }
            }

            // 레이아웃 전환 제어
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if(element) {
                document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
                element.classList.add('active');
                document.getElementById('main-header-title').innerText = element.innerText.replace(/[^\w\s가-힣]/g, '').trim();
            }

            if(pageId === 'page-general' && typeof mapInstance !== 'undefined' && mapInstance !== null) {
                setTimeout(() => { mapInstance.relayout(); }, 100);
            }
        }

        // 💡 [요청 1 반영] 사고사례 DB와 결합 가능한 마스터 패키지 빌더
        function masterSaveAllData() {
            // 일반현황 현재 입력 데이터 강제 수집
            let generalData = null;
            if (typeof saveOverviewData === 'function') { 
                generalData = saveOverviewData(); 
            }

            // 위험 평가 모듈 입력 상태 수집
            let evaluationData = null;
            const evalDataNode = localStorage.getItem('fieldEvaluationData'); 
            if(evalDataNode) { 
                evaluationData = JSON.parse(evalDataNode); 
            }

            // 🔍 미래형 통합 아키텍처: 사고사례 레코드 데이터 동시 패키징
            let accidentDBReference = localStorage.getItem('accidentDB_Reference') || [];

            const currentFacilityName = (generalData && generalData.name) ? generalData.name : globalSelectedFacilityName;
            
            const masterPackage = {
                saveTimestamp: new Date().toISOString(),
                facilityName: currentFacilityName,
                generalInfo: generalData,
                riskEvaluation: evaluationData,
                accidentHistory: accidentDBReference // 사고사례 데이터 링킹 연동 구조 확보
            };

            localStorage.setItem('masterSafetyAssessment', JSON.stringify(masterPackage));
            alert(`[${currentFacilityName}] 일반현황 및 위험평가 결과가 사고사례 참조 정보와 함께 통합 임시저장되었습니다.`);
        }

        function masterLoadAllData() {
            const rawData = localStorage.getItem('masterSafetyAssessment');
            if (!rawData) {
                alert("불러올 수 있는 마스터 통합 데이터 패키지가 존재하지 않습니다.");
                return;
            }

            const masterPackage = JSON.parse(rawData);
            
            if (masterPackage.generalInfo) {
                localStorage.setItem('riskAssessmentOverview', JSON.stringify(masterPackage.generalInfo));
                updateGlobalFacilityLink(masterPackage.generalInfo.name);
            }
            if (masterPackage.riskEvaluation) {
                localStorage.setItem('fieldEvaluationData', JSON.stringify(masterPackage.riskEvaluation));
            }

            const saveDate = new Date(masterPackage.saveTimestamp).toLocaleString('ko-KR');
            alert(`[${masterPackage.facilityName}] 통합 패키지 데이터를 원격 세션에서 복원했습니다.\n(최종 커밋 일시: ${saveDate})`);
            location.reload(); 
        }
    </script>
</body>
</html>
